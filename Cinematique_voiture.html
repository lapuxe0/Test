<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinématique 1D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@600;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #eef1f8; --panel: #ffffff; --border: #c8cfe0;
    --blue: #3a5fd9; --yellow: #c47a00; --green: #0a8f60;
    --orange: #c45500; --gray: #99a3be; --lgray: #4a5272; --dark: #111830;
  }
  body { background:var(--bg); font-family:'DM Mono',monospace; color:var(--dark);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:18px 12px 24px; gap:14px; }
  header { text-align:center; }
  header h1 { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--dark); }
  #fn-expr { font-size:13px; color:var(--blue); font-style:italic; margin-top:3px; }
  .main-wrap { display:flex; gap:14px; width:100%; max-width:1100px; align-items:flex-start; }
  .left-panel { flex:1; display:flex; flex-direction:column; gap:10px; min-width:0; }
  .canvas-box { background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .canvas-box canvas { display:block; width:100%; }
  .graph-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; padding:6px 12px 2px; }
  .right-panel { width:220px; flex-shrink:0; display:flex; flex-direction:column; gap:12px; }
  .ctrl-box { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:14px; }
  .ctrl-box h3 { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px;
    text-transform:uppercase; color:var(--lgray); margin-bottom:10px; }
  .fn-list { display:flex; flex-direction:column; gap:6px; }
  .fn-btn { background:none; border:1px solid var(--border); border-radius:6px; padding:7px 10px;
    font-family:'DM Mono',monospace; font-size:11px; color:var(--lgray); cursor:pointer;
    text-align:left; transition:all .15s; }
  .fn-btn:hover { border-color:var(--blue); color:var(--dark); }
  .fn-btn.active { background:#e8edf8; border-color:var(--blue); color:var(--blue); font-weight:500; }
  .fn-expr-small { font-size:9px; color:var(--gray); display:block; margin-top:2px; font-style:italic; }
  .slider-row { margin-bottom:10px; }
  .slider-row label { display:flex; justify-content:space-between; font-size:11px; color:var(--lgray); margin-bottom:4px; }
  .slider-row label span { color:var(--dark); font-weight:500; }
  input[type=range] { -webkit-appearance:none; width:100%; height:4px; border-radius:4px; background:var(--border); outline:none; }
  input[type=range].blue::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:var(--blue); cursor:pointer; }
  input[type=range].amber::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:var(--yellow); cursor:pointer; }
  .btn-row { display:flex; gap:8px; }
  .btn { flex:1; border:none; border-radius:8px; padding:9px 0; font-family:'DM Mono',monospace; font-size:12px; cursor:pointer; transition:all .15s; }
  .btn-play { background:var(--blue); color:#fff; }
  .btn-play:hover { background:#2e4fbb; }
  .btn-reset { background:#dde2f0; color:var(--dark); }
  .btn-reset:hover { background:#c8cfe0; }
  .info-grid { display:grid; grid-template-columns:auto 1fr; gap:3px 8px; font-size:11px; }
  .info-key { color:var(--lgray); }
  .info-val { color:var(--dark); font-weight:500; text-align:right; }
  .info-val.blue { color:var(--blue); }
  .info-val.green { color:var(--green); }
  .info-val.orange { color:var(--orange); }
</style>
</head>
<body>
<header>
  <h1>Cinématique 1D</h1>
  <div id="fn-expr"></div>
</header>
<div class="main-wrap">
  <div class="left-panel">
    <div class="canvas-box"><canvas id="cvRoad" height="140"></canvas></div>
    <div class="canvas-box">
      <div class="graph-label" style="color:var(--blue)">x(t) — position (m)</div>
      <canvas id="cvPos" height="120"></canvas>
    </div>
    <div class="canvas-box">
      <div class="graph-label" style="color:var(--green)">v(t) — vitesse (m/s)</div>
      <canvas id="cvVel" height="120"></canvas>
    </div>
    <div class="canvas-box">
      <div class="graph-label" style="color:var(--orange)">a(t) — accélération (m/s²)</div>
      <canvas id="cvAcc" height="120"></canvas>
    </div>
  </div>
  <div class="right-panel">
    <div class="ctrl-box">
      <h3>Fonction</h3>
      <div class="fn-list" id="fnList"></div>
    </div>
    <div class="ctrl-box">
      <h3>Contrôles</h3>
      <div class="slider-row">
        <label>Vitesse animation <span id="speedVal">1.0×</span></label>
        <input type="range" class="blue" id="speedSlider" min="0.1" max="3" step="0.1" value="1">
      </div>
      <div class="slider-row">
        <label>t (s) <span id="tVal">0.00</span></label>
        <input type="range" class="amber" id="tSlider" min="0" max="12" step="0.05" value="0">
      </div>
      <div class="btn-row">
        <button class="btn btn-play" id="btnPlay">▶ Play</button>
        <button class="btn btn-reset" id="btnReset">⏮ Reset</button>
      </div>
    </div>
    <div class="ctrl-box">
      <h3>Valeurs</h3>
      <div class="info-grid">
        <span class="info-key">t</span><span class="info-val" id="iv-t">0.00 s</span>
        <span class="info-key">x</span><span class="info-val blue" id="iv-x">0.00 m</span>
        <span class="info-key">v</span><span class="info-val green" id="iv-v">0.00 m/s</span>
        <span class="info-key">a</span><span class="info-val orange" id="iv-a">0.00 m/s²</span>
      </div>
    </div>
  </div>
</div>
<script>
const FUNCTIONS = {
  "Mouvement uniforme":    { fn: t => 1.5*t - 9,                           expr: "x(t) = 1.5t − 9" },
  "Accélération uniforme": { fn: t => 0.5*t*t - 9,                         expr: "x(t) = ½t² − 9" },
  "Sinusoïde amortie":     { fn: t => 7*Math.exp(-0.3*t)*Math.sin(1.5*t), expr: "x(t) = 7·e^(−0.3t)·sin(1.5t)" },
  "Aller-retour":          { fn: t => 5*Math.sin(0.8*t)+2*Math.sin(2*t),  expr: "x(t) = 5·sin(0.8t) + 2·sin(2t)" },
};

const T_MAX = 12, DT = 0.05;
const XLIM = [-9, 9];
const T_ARR = [];
for (let t = 0; t <= T_MAX + 1e-9; t += DT) T_ARR.push(parseFloat(t.toFixed(4)));
const N = T_ARR.length;

function deriv(f, t)  { const h=1e-4; return (f(t+h)-f(t-h))/(2*h); }
function deriv2(f, t) { const h=1e-4; return (f(t+h)-2*f(t)+f(t-h))/(h*h); }
function clamp(v,a,b) { return Math.max(a,Math.min(b,v)); }
function fmt(v) { return (v>=0?'+':'')+v.toFixed(2); }

// Cache
let cache = {};
let currentFn = "Mouvement uniforme";

function loadFunction(name) {
  currentFn = name;
  const f = FUNCTIONS[name].fn;
  const raw = T_ARR.map(f);
  const xs  = raw.map(x => clamp(x, XLIM[0], XLIM[1]));
  const vs  = T_ARR.map(t => deriv(f,t));
  const acs = T_ARR.map(t => deriv2(f,t));
  const border = raw.map(x => x<=XLIM[0] || x>=XLIM[1]);
  cache = {
    xs, vs: vs.map((v,i)=>border[i]?0:v),
    acs: acs.map((a,i)=>border[i]?0:a)
  };
  document.getElementById('fn-expr').textContent = FUNCTIONS[name].expr;
}

// Canvas
const cvRoad = document.getElementById('cvRoad');
const cvPos  = document.getElementById('cvPos');
const cvVel  = document.getElementById('cvVel');
const cvAcc  = document.getElementById('cvAcc');
const C = { blue:'#3a5fd9', yellow:'#c47a00', green:'#0a8f60', orange:'#c45500',
            gray:'#99a3be', lgray:'#4a5272', border:'#c8cfe0', panel:'#ffffff', bg:'#eef1f8',
            road:'#d0d5e8', dashes:'#aab0cc' };

function getW(cv) { return cv.offsetWidth * devicePixelRatio; }
function getH(cv) { return cv.offsetHeight * devicePixelRatio; }
function prep(cv) { cv.width = getW(cv); cv.height = getH(cv); return cv.getContext('2d'); }

function drawRoad(idx) {
  const ctx = prep(cvRoad);
  const W = cvRoad.width, H = cvRoad.height, r = devicePixelRatio;
  ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
  const PAD=50*r, roadH=36*r, roadY=H*0.52;
  const RL=PAD, RR=W-PAD, roadLen=RR-RL;
  const xToPx = x => RL + (x-XLIM[0])/(XLIM[1]-XLIM[0])*roadLen;

  // Route
  ctx.fillStyle=C.road; ctx.beginPath();
  ctx.roundRect(RL-8*r, roadY-roadH/2, roadLen+16*r, roadH, 5*r); ctx.fill();
  ctx.strokeStyle=C.border; ctx.lineWidth=r; ctx.stroke();

  // Tirets
  ctx.strokeStyle=C.dashes; ctx.lineWidth=2*r;
  for (let x=RL+8*r; x<RR-8*r; x+=22*r) {
    ctx.beginPath(); ctx.moveTo(x,roadY); ctx.lineTo(x+12*r,roadY); ctx.stroke();
  }

  // Axe
  const axY = roadY - roadH/2 - 8*r;
  ctx.strokeStyle=C.gray; ctx.lineWidth=r;
  ctx.beginPath(); ctx.moveTo(RL,axY); ctx.lineTo(RR,axY); ctx.stroke();
  ctx.fillStyle=C.lgray;
  ctx.beginPath(); ctx.moveTo(RR+10*r,axY); ctx.lineTo(RR+2*r,axY-4*r); ctx.lineTo(RR+2*r,axY+4*r); ctx.fill();
  ctx.font=`${11*r}px DM Mono`; ctx.textAlign='left';
  ctx.fillText('x', RR+13*r, axY+4*r);

  // Graduations
  ctx.font=`${9*r}px DM Mono`; ctx.textAlign='center'; ctx.fillStyle=C.lgray;
  for (let v=-8; v<=8; v+=2) {
    const px=xToPx(v);
    ctx.strokeStyle=C.gray; ctx.lineWidth=r;
    ctx.beginPath(); ctx.moveTo(px,axY-4*r); ctx.lineTo(px,axY+4*r); ctx.stroke();
    ctx.fillStyle=C.lgray; ctx.fillText(v, px, axY-7*r);
  }
  ctx.strokeStyle=C.blue; ctx.lineWidth=1.2*r; ctx.setLineDash([3*r,2*r]);
  ctx.beginPath(); ctx.moveTo(xToPx(0),axY-2*r); ctx.lineTo(xToPx(0),axY+8*r); ctx.stroke();
  ctx.setLineDash([]);

  // Voiture
  const x_ = cache.xs[idx], v_ = cache.vs[idx];
  const cx = xToPx(x_), cy = roadY, s = r;

  // Projection
  ctx.strokeStyle=C.yellow; ctx.lineWidth=1.5*r; ctx.setLineDash([3*r,3*r]); ctx.globalAlpha=0.7;
  ctx.beginPath(); ctx.moveTo(cx, cy-roadH/2-4*r); ctx.lineTo(cx, cy+2*r); ctx.stroke();
  ctx.setLineDash([]); ctx.globalAlpha=1;

  ctx.save(); ctx.translate(cx, cy);
  ctx.fillStyle='#2563eb'; ctx.beginPath(); ctx.roundRect(-22*s,-14*s,44*s,22*s,5*s); ctx.fill();
  ctx.strokeStyle='#1d4ed8'; ctx.lineWidth=1.5*s; ctx.stroke();
  ctx.fillStyle='#3b82f6'; ctx.beginPath(); ctx.roundRect(-14*s,-26*s,28*s,16*s,5*s); ctx.fill();
  ctx.strokeStyle='#2563eb'; ctx.lineWidth=s; ctx.stroke();
  for (const wx of [-13*s,13*s]) {
    ctx.fillStyle='#111827'; ctx.beginPath(); ctx.arc(wx,9*s,7*s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#374151'; ctx.beginPath(); ctx.arc(wx,9*s,3*s,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='#fef08a'; ctx.globalAlpha=0.9;
  ctx.beginPath(); ctx.roundRect(18*s,-8*s,5*s,7*s,2*s); ctx.fill();
  ctx.fillStyle='#f87171';
  ctx.beginPath(); ctx.roundRect(-23*s,-8*s,5*s,7*s,2*s); ctx.fill();
  ctx.globalAlpha=1;
  if (Math.abs(v_) > 0.05) {
    const al = clamp(v_*6*s, -55*s, 55*s), dir = al>0?1:-1;
    ctx.strokeStyle=C.yellow; ctx.lineWidth=2.5*s;
    ctx.beginPath(); ctx.moveTo(0,-20*s); ctx.lineTo(al,-20*s); ctx.stroke();
    ctx.fillStyle=C.yellow;
    ctx.beginPath(); ctx.moveTo(al,-20*s); ctx.lineTo(al-dir*8*s,-24*s); ctx.lineTo(al-dir*8*s,-16*s); ctx.fill();
  }
  ctx.restore();
  ctx.font=`${9*r}px DM Mono`; ctx.fillStyle=C.yellow; ctx.textAlign='center';
  ctx.fillText(`x = ${fmt(x_)}`, cx, cy+roadH/2+14*r);
}

function drawGraph(cv, color, dataAll, idx) {
  const ctx = prep(cv);
  const W=cv.width, H=cv.height, r=devicePixelRatio;
  ctx.fillStyle=C.panel; ctx.fillRect(0,0,W,H);
  const ml=42*r, mr=16*r, mt=12*r, mb=28*r;
  const gW=W-ml-mr, gH=H-mt-mb;

  let yMin=Math.min(...dataAll), yMax=Math.max(...dataAll);
  const mg=Math.max((yMax-yMin)*0.18,0.8);
  yMin-=mg; yMax+=mg;

  const tpx = t => ml+(t/T_MAX)*gW;
  const ypx = y => mt+(1-(y-yMin)/(yMax-yMin))*gH;

  // Grille
  ctx.strokeStyle=C.border; ctx.lineWidth=0.5*r;
  for (let i=0; i<=4; i++) {
    const y=yMin+i*(yMax-yMin)/4, py=ypx(y);
    ctx.beginPath(); ctx.moveTo(ml,py); ctx.lineTo(ml+gW,py); ctx.stroke();
    ctx.font=`${8*r}px DM Mono`; ctx.fillStyle=C.lgray; ctx.textAlign='right';
    ctx.fillText(y.toFixed(1), ml-4*r, py+3*r);
  }
  for (let t=0; t<=T_MAX; t+=2) {
    const px=tpx(t);
    ctx.beginPath(); ctx.moveTo(px,mt); ctx.lineTo(px,mt+gH); ctx.stroke();
    ctx.font=`${8*r}px DM Mono`; ctx.fillStyle=C.lgray; ctx.textAlign='center';
    ctx.fillText(t, px, mt+gH+14*r);
  }
  if (yMin<0&&yMax>0) {
    ctx.strokeStyle=C.gray; ctx.lineWidth=0.8*r;
    ctx.beginPath(); ctx.moveTo(ml,ypx(0)); ctx.lineTo(ml+gW,ypx(0)); ctx.stroke();
  }

  // Courbe fond
  ctx.strokeStyle=C.border; ctx.lineWidth=1.5*r; ctx.beginPath();
  dataAll.forEach((y,i)=>{ const px=tpx(T_ARR[i]),py=ypx(y); i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); });
  ctx.stroke();

  // Courbe passée
  if (idx > 0) {
    ctx.strokeStyle=color; ctx.lineWidth=2.2*r; ctx.beginPath();
    for (let i=0;i<=idx;i++) { const px=tpx(T_ARR[i]),py=ypx(dataAll[i]); i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
    ctx.stroke();
  }

  // Ligne t + point
  const tx=tpx(T_ARR[idx]);
  ctx.strokeStyle=C.yellow; ctx.lineWidth=r; ctx.setLineDash([4*r,3*r]); ctx.globalAlpha=0.5;
  ctx.beginPath(); ctx.moveTo(tx,mt); ctx.lineTo(tx,mt+gH); ctx.stroke();
  ctx.setLineDash([]); ctx.globalAlpha=1;
  const dy=ypx(clamp(dataAll[idx],yMin,yMax));
  ctx.fillStyle=C.yellow; ctx.globalAlpha=0.2;
  ctx.beginPath(); ctx.arc(tx,dy,8*r,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.beginPath(); ctx.arc(tx,dy,5*r,0,Math.PI*2); ctx.fill();

  ctx.font=`${8*r}px DM Mono`; ctx.fillStyle=C.lgray; ctx.textAlign='right';
  ctx.fillText('t (s)', W-2*r, mt+gH+14*r);
}

function drawAll(idx) {
  drawRoad(idx);
  drawGraph(cvPos, C.blue,   cache.xs,  idx);
  drawGraph(cvVel, C.green,  cache.vs,  idx);
  drawGraph(cvAcc, C.orange, cache.acs, idx);
  document.getElementById('iv-t').textContent = T_ARR[idx].toFixed(2)+' s';
  document.getElementById('iv-x').textContent = fmt(cache.xs[idx])+' m';
  document.getElementById('iv-v').textContent = fmt(cache.vs[idx])+' m/s';
  document.getElementById('iv-a').textContent = fmt(cache.acs[idx])+' m/s²';
  document.getElementById('tVal').textContent  = T_ARR[idx].toFixed(2);
  document.getElementById('tSlider').value = T_ARR[idx];
}

// Boutons fonction
const fnList = document.getElementById('fnList');
Object.entries(FUNCTIONS).forEach(([name,{expr}]) => {
  const btn = document.createElement('button');
  btn.className = 'fn-btn' + (name===currentFn?' active':'');
  btn.innerHTML = `${name}<span class="fn-expr-small">${expr}</span>`;
  btn.onclick = () => {
    document.querySelectorAll('.fn-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    stop();
    loadFunction(name);
    anim.t = 0;
    drawAll(0);
  };
  fnList.appendChild(btn);
});

// ── Animation basée sur setInterval, pas requestAnimationFrame ────────────────
// On utilise un intervalle fixe de 50ms et on avance de (speed * 1 step) à chaque tick
// Vitesse 1.0 = temps réel (DT=0.05s par tick de 50ms)
const anim = { t: 0, timer: null, speed: 1.0 };

function step() {
  anim.t += DT * anim.speed;
  if (anim.t >= T_MAX) { anim.t = T_MAX; stop(); }
  const idx = Math.min(Math.round(anim.t / DT), N-1);
  drawAll(idx);
}

function stop() {
  if (anim.timer) { clearInterval(anim.timer); anim.timer = null; }
  document.getElementById('btnPlay').textContent = '▶ Play';
}

function play() {
  anim.timer = setInterval(step, 50);
  document.getElementById('btnPlay').textContent = '⏸ Pause';
}

document.getElementById('btnPlay').onclick = () => {
  if (anim.timer) { stop(); return; }
  if (anim.t >= T_MAX) anim.t = 0;
  play();
};

document.getElementById('btnReset').onclick = () => {
  stop(); anim.t = 0; drawAll(0);
};

document.getElementById('speedSlider').oninput = e => {
  anim.speed = parseFloat(e.target.value);
  document.getElementById('speedVal').textContent = anim.speed.toFixed(1)+'×';
};

document.getElementById('tSlider').oninput = e => {
  stop();
  anim.t = parseFloat(e.target.value);
  const idx = Math.min(Math.round(anim.t / DT), N-1);
  drawAll(idx);
};

window.addEventListener('resize', () => drawAll(Math.min(Math.round(anim.t/DT), N-1)));

// Init
loadFunction(currentFn);
drawAll(0);
</script>
</body>
</html>
